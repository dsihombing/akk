    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBVXx_p9iTBFg1FdDVDLf7RNLJRfo31Mh4",
            authDomain: "akkds-83803.firebaseapp.com",
            projectId: "akkds-83803",
            storageBucket: "akkds-83803.firebasestorage.app",

        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const emailDosen = "djc.sihombing@gmail.com";

        // AUTH GUARD KHUSUS DOSEN
        auth.onAuthStateChanged(user => {
            if (!user || user.email.toLowerCase() !== emailDosen) {
                alert("Akses Ilegal! Anda bukan Dosen.");
                window.location.replace("login.html");
            } else {
                muatLogAktivitas();
            }
        });

        function formatWaktu(timestamp) {
            if (!timestamp) return "Baru saja...";
            const date = timestamp.toDate();
            return date.toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
    </script>

    <style>
        :root { --primary: #004a8f; --primary-dark: #002c5c; --bg-body: #f8fafc; --border: #e2e8f0; }

<body>
    <header>
        <h3 style="margin:0;"><i class="fas fa-satellite-dish"></i> Pusat Observasi Mahasiswa</h3>
        <a href="dosen.html" class="btn-kembali"><i class="fas fa-arrow-left"></i> Kembali ke Dasbor</a>
    </header>

    <div class="container">
        <div class="card" style="border-top: 4px solid var(--accent);">
            <h2 style="margin-top:0; color:var(--primary-dark);"><i class="fas fa-history"></i> Log Aktivitas Real-Time</h2>
            <p style="color:#64748b; margin-bottom: 20px;">Memantau 100 aktivitas terakhir mahasiswa secara langsung (CCTV Akademik).</p>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 180px;">Waktu (WIB)</th>
                            <th>Nama Mahasiswa</th>
                            <th>Email</th>
                            <th>Aktivitas Terdeteksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelLog">
                        <tr><td colspan="4" style="text-align:center; padding: 2rem;"><i class="fas fa-spinner fa-spin"></i> Menghubungkan ke satelit database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function muatLogAktivitas() {
            // Mengambil data dari koleksi "log_aktivitas", diurutkan dari yang paling baru
            db.collection("log_aktivitas")
              .orderBy("waktu", "desc")
              .limit(100) // Batasi 100 data terakhir agar tidak berat
              .onSnapshot(snapshot => {
                  const tbody = document.getElementById('tabelLog');
                  tbody.innerHTML = "";
                  
                  if (snapshot.empty) {
                      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:2rem;">Belum ada aktivitas terekam.</td></tr>';
                      return;
                  }

                  snapshot.forEach(doc => {
                      const data = doc.data();
                      tbody.innerHTML += `
                          <tr>
                              <td style="color:#64748b; font-size:0.85rem;">${formatWaktu(data.waktu)}</td>
                              <td style="font-weight:bold; color:var
