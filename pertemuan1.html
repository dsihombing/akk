<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observasi Mahasiswa | Analisis Komputasional Komunikasi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBVXx_p9iTBFg1FdDVDLf7RNLJRfo31Mh4", authDomain: "akkds-83803.firebaseapp.com", projectId: "akkds-83803" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const emailDosen = "djc.sihombing@gmail.com";

        let dataLogGlobal = [];

        auth.onAuthStateChanged(user => {
            if (!user || user.email.toLowerCase() !== emailDosen) {
                alert("Akses Ilegal!"); window.location.replace("login.html");
            } else {
                muatFilterMahasiswa();
                muatLogAktivitas();
            }
        });

        function formatWaktu(timestamp) {
            if (!timestamp) return "Baru saja...";
            const date = timestamp.toDate();
            return date.toLocaleString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
        }
    </script>

    <style>
        :root { --primary: #004a8f; --primary-dark: #002c5c; --bg-body: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; color: #1e293b; line-height: 1.6;}
        header { background: var(--primary-dark); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:10;}
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .btn-kembali { background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-flex; gap: 8px; align-items: center;}
        
        .filter-area { background: #f1f5f9; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--border);}
        .filter-area select { padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; font-size: 1rem; flex-grow: 1; cursor: pointer;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.95rem; }
        th, td { text-align: left; padding: 12px 15px; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; color: var(--primary-dark); }
        tr:hover { background: #f1f5f9; }
        
        .badge-aksi { background: #eff6ff; color: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }
        .badge-status-aktif { background: #fef3c7; color: #047857; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;}
        .badge-status-selesai { background: #f1f5f9; color: #64748b; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;}
    </style>
</head>
<body>
    <header>
        <h3 style="margin:0;"><i class="fas fa-satellite-dish"></i> Analitik Pembelajaran Mahasiswa</h3>
        <a href="dosen.html" class="btn-kembali"><i class="fas fa-arrow-left"></i> Kembali ke Dasbor</a>
    </header>

    <div class="container">
        <div class="card" style="border-top: 4px solid #10b981;">
            <h2 style="margin-top:0; color:var(--primary-dark);"><i class="fas fa-stopwatch"></i> Pemantauan Durasi Baca Modul</h2>
            <p style="color:#64748b; margin-bottom: 20px;">Memantau jejak modul yang diakses mahasiswa beserta waktu yang mereka habiskan di halaman tersebut.</p>
            
            <div class="filter-area">
                <i class="fas fa-filter" style="color: var(--primary);"></i>
                <label style="font-weight: bold; color: var(--primary-dark);">Filter Mahasiswa:</label>
                <select id="pilihanMahasiswa" onchange="renderTabel()">
                    <option value="semua">Tampilkan Semua Mahasiswa</option>
                </select>
            </div>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 150px;">Waktu Akses</th>
                            <th>Nama Mahasiswa</th>
                            <th>Modul Diakses</th>
                            <th>Status / Durasi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelLog">
                        <tr><td colspan="4" style="text-align:center; padding: 2rem;"><i class="fas fa-spinner fa-spin"></i> Menghubungkan ke database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function muatFilterMahasiswa() {
            db.collection("whitelist_mahasiswa").get().then((querySnapshot) => {
                const selectElement = document.getElementById('pilihanMahasiswa');
                querySnapshot.forEach((doc) => {
                    selectElement.innerHTML += `<option value="${doc.id}">${doc.id}</option>`;
                });
            });
        }

        function muatLogAktivitas() {
            // Ambil 300 data terbaru
            db.collection("log_aktivitas").orderBy("waktu_masuk", "desc").limit(300).onSnapshot(snapshot => {
                  dataLogGlobal = [];
                  snapshot.forEach(doc => dataLogGlobal.push(doc.data()));
                  renderTabel();
              });
        }

        function renderTabel() {
            const tbody = document.getElementById('tabelLog');
            const emailFilter = document.getElementById('pilihanMahasiswa').value;
            tbody.innerHTML = "";
            let jumlahTampil = 0;

            dataLogGlobal.forEach(data => {
                if (emailFilter === "semua" || data.email === emailFilter) {
                    
                    // Cek apakah mahasiswa masih online di halaman tersebut atau sudah selesai
                    let statusDurasi = "";
                    if (data.status === "Selesai") {
                        statusDurasi = `<span class="badge-status-selesai"><i class="fas fa-clock"></i> ${data.durasi_teks}</span>`;
                    } else {
                        statusDurasi = `<span class="badge-status-aktif"><i class="fas fa-eye fa-fade"></i> Sedang Aktif...</span>`;
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td style="color:#64748b; font-size:0.85rem;">${formatWaktu(data.waktu_masuk)}</td>
                            <td>
                                <div style="font-weight:bold; color:var(--primary-dark);">${data.nama}</div>
                                <div style="font-size:0.8rem; color:#64748b;">${data.email}</div>
                            </td>
                            <td><span class="badge-aksi">${data.aksi}</span></td>
                            <td>${statusDurasi}</td>
                        </tr>
                    `;
                    jumlahTampil++;
                }
            });

            if (jumlahTampil === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:2rem; color:#64748b;">Tidak ada catatan durasi untuk email ini.</td></tr>`;
            }
        }
    </script>
</body>
</html>
